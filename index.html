<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ystradgynlais AFC Matchday Hub</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#003b7a;
    color:white;
}

.header{
    background:#002a57;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:4px solid #d4af37;
}

.header-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.header-left img{
    height:80px;
}

.header h1{
    margin:0;
    font-size:42px;
}

.header p{
    margin:5px 0 0;
    color:#d4af37;
}

#clock{
    font-size:36px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#002a57;
    border:2px solid #d4af37;
    border-radius:12px;
    padding:20px;
}

.card h2{
    margin-top:0;
    color:#d4af37;
}

.data-card{
    background:#004a99;
    margin:10px 0;
    padding:12px;
    border-radius:8px;
}

.full-width{
    margin-top:20px;
}

.footer{
    margin-top:20px;
    background:#d4af37;
    color:black;
    text-align:center;
    padding:12px;
    font-weight:bold;
}

.screen{
    display:none;
}

.screen.active{
    display:block;
    animation:fadeIn 1s;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>

</head>

<body>

<div class="header">
    <div class="header-left">
        <img src="badge.png" alt="Ystradgynlais AFC Badge">
        <div>
            <h1>YSTRADGYNLAIS AFC</h1>
            <p>Clwb i Bawb – A Club for Everyone</p>
        </div>
    </div>

<div id="clock"></div>

</div>

<div class="container">
<div id="screen1" class="screen active">
    
<div class="grid">

    <div class="card">
        <h2>⚽ Today's Fixtures</h2>
        <div id="fixtures-list">Loading fixtures...</div>
    </div>

    <div class="card">
        <h2>📊 Live Scores</h2>
        <div id="scores-list">Loading scores...</div>
    </div>

    <div class="card">
        <h2>📅 Upcoming Events</h2>
        <div id="events-list">Loading events...</div>
    </div>

    <div class="card">
        <h2>🙋 Volunteers Needed</h2>
        <div id="volunteers-list">Loading volunteer roles...</div>
    </div>

</div>
    
</div>
<div id="screen2" class="screen">

<div class="card full-width">
    <h2>🏢 Sponsors</h2>
</div>

</div>
<div id="screen3" class="screen">

<div class="card full-width">
    <h2>📸 Around The Club</h2>
    <iframe
  src="https://photos.app.goo.gl/nU7pznSTyD4uZbPV9"
  width="100%"
  height="600"
  style="border:none;">
</iframe>
</div>

</div>
    
</div>
<div class="footer">
    YSTRADGYNLAIS AFC • MATCHDAY HUB • EST. 1911
</div>

<script>

function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('en-GB',{
            hour:'2-digit',
            minute:'2-digit'
        });
}

updateClock();
setInterval(updateClock,1000);

const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTH31XSFheY-3zxOZml1eP51kEdAXGiQMeGinvzyTThamIwjDBkyyuHleSVIrbyFQSNdUGgCC3dpixM/pub';

async function loadFixtures(){
    const response = await fetch(BASE + '?gid=0&single=true&output=csv');
    const csv = await response.text();
    const rows = csv.trim().split('\n').slice(1);

    let html = '';

    rows.forEach(row => {
        const c = row.split(',');

        html += `
        <div class="data-card">
            <strong>${c[0]}</strong><br>
            ${c[1]} vs ${c[2]}<br>
            ${c[3]}
        </div>`;
    });

    document.getElementById('fixtures-list').innerHTML = html;
}

async function loadScores(){
    const response = await fetch(BASE + '?gid=134670430&single=true&output=csv');
    const csv = await response.text();
    const rows = csv.trim().split('\n').slice(1);

    let html = '';

    rows.forEach(row => {
        const c = row.split(',');

        html += `
        <div class="data-card">
            <strong>${c[0]}</strong><br>
            vs ${c[1]}<br>
            ${c[2]}
        </div>`;
    });

    document.getElementById('scores-list').innerHTML = html;
}

async function loadEvents(){
    const response = await fetch(BASE + '?gid=772596660&single=true&output=csv');
    const csv = await response.text();
    const rows = csv.trim().split('\n').slice(1);

    let html = '';

    rows.forEach(row => {
        const c = row.split(',');

        html += `
        <div class="data-card">
            <strong>${c[0]}</strong><br>
            ${c[1]}
        </div>`;
    });

    document.getElementById('events-list').innerHTML = html;
}

async function loadVolunteers(){
    const response = await fetch(BASE + '?gid=680568062&single=true&output=csv');
    const csv = await response.text();
    const rows = csv.trim().split('\n').slice(1);

    let html = '';

    rows.forEach(row => {
        html += `
        <div class="data-card">
            ${row}
        </div>`;
    });

    document.getElementById('volunteers-list').innerHTML = html;
}

loadFixtures();
loadScores();
loadEvents();
loadVolunteers();

setInterval(() => {
    loadFixtures();
    loadScores();
    loadEvents();
    loadVolunteers();
}, 120000);

    let currentScreen = 0;

const screens = [
    document.getElementById('screen1'),
    document.getElementById('screen2'),
    document.getElementById('screen3')
];

setInterval(() => {

    screens[currentScreen].classList.remove('active');

    currentScreen++;

    if(currentScreen >= screens.length){
        currentScreen = 0;
    }

    screens[currentScreen].classList.add('active');

}, 15000);
</script>

</body>
</html>
